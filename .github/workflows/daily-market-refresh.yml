name: Daily Market Data Refresh

on:
  workflow_dispatch:
  schedule:
    # 23:15 UTC = ~6:15 PM ET (after US market close + settlement buffer)
    - cron: "15 23 * * 1-5"

permissions:
  contents: write

concurrency:
  group: market-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Generate market data snapshot
        run: |
          echo "Running market data snapshot at $(date -u)"
          node scripts/update-market-data.js
          echo "---- funds-snapshot.json (first 60 lines) ----"
          head -60 data/funds-snapshot.json

      - name: Commit and push updated snapshot
        run: |
          git config user.name "mbd-bot"
          git config user.email "mbd-bot@users.noreply.github.com"
          git add data/funds-snapshot.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update funds-snapshot.json [$(date -u +%Y-%m-%d)]"
          git push
